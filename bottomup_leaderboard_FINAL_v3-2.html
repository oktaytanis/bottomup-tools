<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BottomUP Leaderboard Editor</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;700;900&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0B1020; font-family: 'Inter', sans-serif; color: #f0f0f5; display: flex; flex-direction: column; align-items: center; min-height: 100vh; padding: 20px; }

  .top-bar { width: 100%; max-width: 980px; display: flex; align-items: center; gap: 12px; padding: 14px 0 10px; border-bottom: 1px solid rgba(255,255,255,0.07); margin-bottom: 18px; }
  .top-title { font-family: 'DM Sans', sans-serif; font-size: 18px; font-weight: 900; color: #fff; letter-spacing: 0.5px; }
  .top-sub { font-size: 12px; color: #5B4DFF; font-weight: 600; background: rgba(91,77,255,0.12); padding: 3px 10px; border-radius: 20px; }

  .layout { display: flex; gap: 20px; width: 100%; max-width: 980px; align-items: flex-start; }

  /* Canvas */
  .canvas-wrap {
    position: relative;
    width: 500px;
    height: 625px;
    flex-shrink: 0;
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 0 40px rgba(91,77,255,0.3);
  }
  .bg {
    position: absolute; top: 0; left: 0;
    width: 100%; height: 100%;
    object-fit: cover;
    pointer-events: none;
    user-select: none;
  }

  /* Drag blocks */
  .drag-block {
    position: absolute;
    cursor: move;
    user-select: none;
    z-index: 10;
  }
  .drag-hint {
    font-size: 8px;
    color: rgba(255,255,255,0.3);
    text-align: center;
    margin-bottom: 2px;
    pointer-events: none;
  }

  /* Avatar rings */
  .av-ring {
    width: 72px; height: 72px;
    border-radius: 50%;
    border: 2px solid rgba(124,109,250,0.7);
    overflow: hidden;
    cursor: pointer;
    background: rgba(124,109,250,0.1);
    display: flex; align-items: center; justify-content: center;
    transition: border-color 0.2s;
  }
  .av-ring:hover { border-color: #7c6dfa; }
  .av-ring.small { width: 64px; height: 64px; }
  .av-ring svg { pointer-events: none; }
  .av-ring img { width: 100%; height: 100%; object-fit: cover; }

  /* Stat blocks */
  .stat-block {
    background: rgba(10,10,20,0.75);
    backdrop-filter: blur(8px);
    border: 1px solid rgba(124,109,250,0.25);
    border-radius: 10px;
    padding: 8px 12px;
    min-width: 110px;
    pointer-events: none;
  }
  .stat-name {
    font-family: 'DM Sans', sans-serif;
    font-size: 13px; font-weight: 700;
    color: #fff; margin-bottom: 4px;
    text-align: center;
    pointer-events: none;
  }
  .stat-row {
    display: flex; justify-content: space-between;
    font-size: 10px; color: #aaa; margin-bottom: 2px;
    pointer-events: none;
  }
  .stat-val { color: #7c6dfa; font-weight: 600; pointer-events: none; }
  .stat-val.green { color: #1E7F5C; }

  /* Side panel */
  .panel {
    flex: 1;
    background: #10101a;
    border: 1px solid rgba(255,255,255,0.07);
    border-radius: 12px;
    padding: 18px;
    display: flex;
    flex-direction: column;
    gap: 14px;
    max-height: 625px;
    overflow-y: auto;
  }
  .panel::-webkit-scrollbar { width: 4px; }
  .panel::-webkit-scrollbar-track { background: transparent; }
  .panel::-webkit-scrollbar-thumb { background: #5B4DFF; border-radius: 2px; }

  .tab-row { display: flex; gap: 6px; }
  .tab {
    flex: 1; padding: 7px 0;
    border-radius: 6px; border: 1px solid rgba(255,255,255,0.1);
    background: transparent; color: #888;
    font-family: 'Inter', sans-serif; font-size: 12px; font-weight: 600;
    cursor: pointer; transition: all 0.15s;
  }
  .tab.active { background: #5B4DFF; color: #fff; border-color: #5B4DFF; }
  .tab:hover:not(.active) { border-color: #5B4DFF; color: #aaa; }

  .field { display: flex; flex-direction: column; gap: 4px; }
  .field label { font-size: 10px; color: #666; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
  .field input {
    background: #0a0a0f; border: 1px solid rgba(255,255,255,0.1);
    border-radius: 6px; color: #f0f0f5;
    font-family: 'Inter', sans-serif; font-size: 12px;
    padding: 7px 10px; width: 100%;
  }
  .field input:focus { outline: none; border-color: #7c6dfa; }
  .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
  .divider { height: 1px; background: rgba(255,255,255,0.06); }
  .btn-dl {
    width: 100%; padding: 12px;
    border-radius: 8px; border: none;
    background: linear-gradient(135deg, #5B4DFF, #7c6dfa);
    color: #fff; font-family: 'Inter', sans-serif;
    font-size: 13px; font-weight: 700;
    cursor: pointer; transition: opacity 0.2s; margin-top: 4px;
  }
  .btn-dl:hover { opacity: 0.85; }
  .tip { font-size: 10px; color: #55556a; text-align: center; line-height: 1.6; }

  .av-upload-btn {
    width: 100%;
    padding: 8px;
    background: rgba(91,77,255,0.15);
    border: 1px dashed rgba(91,77,255,0.4);
    border-radius: 6px;
    color: #7c6dfa;
    font-size: 11px; font-weight: 600;
    cursor: pointer;
    text-align: center;
    transition: all 0.15s;
  }
  .av-upload-btn:hover { background: rgba(91,77,255,0.25); }
</style>
</head>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script>
// Tab switching
function setTab(n) {
  [1,2,3].forEach(i => {
    document.getElementById('pnl'+i).style.display = i===n ? 'block' : 'none';
    document.querySelectorAll('.tab')[i-1].classList.toggle('active', i===n);
  });
}

// Avatar loader
function loadAv(e, n) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    const ring = document.getElementById('av'+n+'Ring');
    ring.innerHTML = '<img src="'+ev.target.result+'" style="width:100%;height:100%;object-fit:cover;border-radius:50%;">';
  };
  reader.readAsDataURL(file);
}

// Drag logic
function makeDraggable(id) {
  const el = document.getElementById(id);
  const wrap = document.getElementById('canvasWrap');
  let ox=0, oy=0, sx=0, sy=0;

  el.addEventListener('mousedown', e => {
    if (e.target.tagName === 'INPUT' || e.target.tagName === 'BUTTON') return;
    e.preventDefault();
    const wr = wrap.getBoundingClientRect();
    sx = e.clientX; sy = e.clientY;
    ox = el.offsetLeft; oy = el.offsetTop;
    function move(e) {
      const nx = ox + e.clientX - sx;
      const ny = oy + e.clientY - sy;
      el.style.left = Math.max(0, Math.min(wr.width - el.offsetWidth, nx)) + 'px';
      el.style.top  = Math.max(0, Math.min(wr.height - el.offsetHeight, ny)) + 'px';
      savePos();
    }
    function up() {
      document.removeEventListener('mousemove', move);
      document.removeEventListener('mouseup', up);
    }
    document.addEventListener('mousemove', move);
    document.addEventListener('mouseup', up);
  });

  // Touch
  el.addEventListener('touchstart', e => {
    if (e.target.tagName === 'INPUT') return;
    const t = e.touches[0];
    const wr = wrap.getBoundingClientRect();
    sx = t.clientX; sy = t.clientY;
    ox = el.offsetLeft; oy = el.offsetTop;
    function tmove(e) {
      e.preventDefault();
      const t = e.touches[0];
      const nx = ox + t.clientX - sx;
      const ny = oy + t.clientY - sy;
      el.style.left = Math.max(0, Math.min(wr.width - el.offsetWidth, nx)) + 'px';
      el.style.top  = Math.max(0, Math.min(wr.height - el.offsetHeight, ny)) + 'px';
      savePos();
    }
    function tup() {
      el.removeEventListener('touchmove', tmove);
      el.removeEventListener('touchend', tup);
    }
    el.addEventListener('touchmove', tmove, {passive:false});
    el.addEventListener('touchend', tup);
  });
}

['av1','av2','av3','blk1','blk2','blk3'].forEach(makeDraggable);

// Position persistence
function savePos() {
  const ids = ['av1','av2','av3','blk1','blk2','blk3'];
  const data = {};
  ids.forEach(id => {
    const el = document.getElementById(id);
    data[id] = {left: el.style.left, top: el.style.top};
  });
  try { localStorage.setItem('bu_lb_pos', JSON.stringify(data)); } catch(e) {}
}

function loadPos() {
  try {
    const data = JSON.parse(localStorage.getItem('bu_lb_pos') || '{}');
    Object.keys(data).forEach(id => {
      const el = document.getElementById(id);
      if (el && data[id].left) {
        el.style.left = data[id].left;
        el.style.top  = data[id].top;
      }
    });
  } catch(e) {}
}
loadPos();

// Download
async function downloadPNG() {
  const hints = document.querySelectorAll('.drag-hint');
  hints.forEach(h => h.style.visibility = 'hidden');
  const canvas = await html2canvas(document.getElementById('canvasWrap'), {
    scale: 2, useCORS: true, backgroundColor: null,
    width: 500, height: 625
  });
  hints.forEach(h => h.style.visibility = 'visible');
  const a = document.createElement('a');
  a.download = 'bottomup_leaderboard.png';
  a.href = canvas.toDataURL('image/png');
  a.click();
}
</script>
